<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="shortcut icon" href="images/favicon.ico"/>
    <title>Document</title>
</head>
<body>
<!--<div class="img-src"></div>-->

<script src="three.js-master/src/three.min.js"></script>
<script src="three.js-master/src/GLTFLoader.js"></script>
<script src="three.js-master/src/GIS_Files/GIS_files/Moonquake_viewer_in_ArcGlobe.3dd"></script>

<script>

let scene, camera, renderer;

function init(); {

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdddddd);

    camera = new THREE.PerspectiveCamera(40,window.innerWidth/window.innerHeight,1,5000);

    hlight = new THREE.AmbientLight (0x404040,100);
    scene.add(hlight);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth,window.innerHeight);
    document.body.appendChild(renderer.domElement);

    let loader = new THREE.GLFTLoader({antialias:true});
    loader.load('three.js-master/src/GIS_Files/GIS_files/Moonquake_viewer_in_ArcGlobe.3dd', function(gltf){
        scene.add(gltf.scene);
        renderer.render(scene,camera);
    });
}
init();
</script>
    
</body>
</html>
